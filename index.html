<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
Hirokaka Card Maker
</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

*{
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{
margin:0;
background:
linear-gradient(
135deg,
#0f172a,
#1e293b
);
color:white;
}

.header{
height:70px;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
font-weight:bold;
color:#38bdf8;
}

.wrap{
display:flex;
flex-wrap:wrap;
gap:30px;
padding:30px;
justify-content:center;
}

.panel{
width:420px;
background:rgba(255,255,255,.08);
padding:25px;
border-radius:24px;
backdrop-filter:blur(8px);
}

.panel h2{
margin-top:0;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:18px;
border:none;
border-radius:12px;
font-size:16px;
background:#e2e8f0;
}

textarea{
height:130px;
resize:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-size:18px;
cursor:pointer;
background:#38bdf8;
color:white;
font-weight:bold;
margin-top:10px;
}

.card-area{
display:flex;
justify-content:center;
align-items:flex-start;
}

.card{

width:350px;
height:500px;

border-radius:24px;

padding:18px;

position:relative;

overflow:hidden;

box-shadow:
0 0 25px rgba(0,0,0,.5);

transition:.2s;

background-size:cover;
background-position:center;

}

.fire{
background:
linear-gradient(
180deg,
#ffb347,
#ff5e62
);
}

.water{
background:
linear-gradient(
180deg,
#56ccf2,
#2f80ed
);
}

.dark{
background:
linear-gradient(
180deg,
#434343,
#000000
);
}

.light{
background:
linear-gradient(
180deg,
#fff6b7,
#f6416c
);
}

.card-name{
font-size:28px;
font-weight:bold;
background:rgba(0,0,0,.35);
padding:10px;
border-radius:14px;
}

.cost{
position:absolute;
top:16px;
right:16px;
width:52px;
height:52px;
border-radius:50%;
background:white;
color:black;
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
font-weight:bold;
}

.image-box{
margin-top:15px;
height:210px;
background:rgba(255,255,255,.3);
border-radius:18px;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.image-box img{
width:100%;
height:100%;
object-fit:cover;
}

.type{
margin-top:12px;
font-size:18px;
font-weight:bold;
background:rgba(0,0,0,.35);
padding:8px;
border-radius:10px;
}

.effect{
margin-top:15px;
background:rgba(255,255,255,.82);
color:black;
padding:14px;
height:120px;
border-radius:16px;
overflow:auto;
font-size:16px;
line-height:1.5;
}

.power{
position:absolute;
bottom:16px;
right:18px;
font-size:28px;
font-weight:bold;
background:rgba(0,0,0,.5);
padding:8px 18px;
border-radius:16px;
}

.credit{
position:absolute;
bottom:12px;
left:18px;
font-size:12px;
opacity:.8;
}

</style>
</head>

<body>

<div class="header">
Hirokaka Card Maker
</div>

<div class="wrap">

<div class="panel">

<h2>
カード編集
</h2>

<label>
カード名
</label>

<input
id="nameInput"
value="蒼海竜 アクアレイザー">

<label>
コスト
</label>

<input
id="costInput"
type="number"
value="7">

<label>
種族
</label>

<input
id="typeInput"
value="ドラゴン / ウォーター">

<label>
効果
</label>

<textarea
id="effectInput">このクリーチャーが登場した時、カードを2枚引く。</textarea>

<label>
パワー
</label>

<input
id="powerInput"
value="9000">

<label>
文明カラー
</label>

<select id="themeInput">

<option value="water">
水文明
</option>

<option value="fire">
火文明
</option>

<option value="dark">
闇文明
</option>

<option value="light">
光文明
</option>

</select>

<label>
画像アップロード
</label>

<input
type="file"
id="imageInput"
accept="image/*">

<button onclick="downloadCard()">
PNG保存（iPhone対応）
</button>

</div>

<div class="card-area">

<div
class="card water"
id="card">

<div
class="card-name"
id="cardName">

蒼海竜 アクアレイザー

</div>

<div
class="cost"
id="cardCost">

7

</div>

<div class="image-box">

<img
id="cardImage"
src="https://picsum.photos/400/300">

</div>

<div
class="type"
id="cardType">

ドラゴン / ウォーター

</div>

<div
class="effect"
id="cardEffect">

このクリーチャーが登場した時、カードを2枚引く。

</div>

<div
class="power"
id="cardPower">

9000

</div>

<div class="credit">
Hirokakapresents
</div>

</div>

</div>

</div>

<script>

const nameInput=
document.getElementById("nameInput")

const costInput=
document.getElementById("costInput")

const typeInput=
document.getElementById("typeInput")

const effectInput=
document.getElementById("effectInput")

const powerInput=
document.getElementById("powerInput")

const themeInput=
document.getElementById("themeInput")

const imageInput=
document.getElementById("imageInput")

function updateCard(){

document
.getElementById("cardName")
.innerText=
nameInput.value

document
.getElementById("cardCost")
.innerText=
costInput.value

document
.getElementById("cardType")
.innerText=
typeInput.value

document
.getElementById("cardEffect")
.innerText=
effectInput.value

document
.getElementById("cardPower")
.innerText=
powerInput.value

const card=
document.getElementById("card")

card.className=
"card " + themeInput.value

}

nameInput.oninput=updateCard
costInput.oninput=updateCard
typeInput.oninput=updateCard
effectInput.oninput=updateCard
powerInput.oninput=updateCard
themeInput.onchange=updateCard

imageInput.addEventListener(
"change",
e=>{

const file=
e.target.files[0]

if(!file)return

const reader=
new FileReader()

reader.onload=
ev=>{

document
.getElementById("cardImage")
.src=
ev.target.result

}

reader.readAsDataURL(file)

}
)

function downloadCard(){

html2canvas(
document.getElementById("card")
).then(canvas=>{

const image =
canvas.toDataURL("image/png")

const newTab =
window.open()

newTab.document.write(`
<style>
body{
margin:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
img{
max-width:95%;
border-radius:20px;
box-shadow:0 0 30px rgba(255,255,255,.2);
}
</style>

<img src="${image}">
`)

})

}

</script>

</body>
</html>
